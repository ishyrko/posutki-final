framework:
    messenger:
        buses:
            command.bus:
                middleware:
                    - validation
                    - doctrine_transaction
            query.bus:
                middleware:
                    - validation
            notification.bus: ~

        default_bus: command.bus
        transports:
            sync: 'sync://'

        # Notification events (property moderation, messages, contact feedback) are
        # handled synchronously on notification.bus — no worker or queue required.
