server {
    listen 80;
    server_name _;

    client_max_body_size 10m;

    # Static uploaded files served directly from disk
    location /uploads {
        alias /var/www/backend/public/uploads;
        try_files $uri =404;
    }

    # Symfony bundle assets (EasyAdmin, etc.)
    location ^~ /bundles/ {
        alias /var/www/backend/public/bundles/;
        try_files $uri =404;
    }

    # Custom static JS under public/js (e.g. EasyAdmin configureAssets) — must precede Next.js catch-all
    location ^~ /js/ {
        alias /var/www/backend/public/js/;
        try_files $uri =404;
    }

    # API + Admin (EasyAdmin) → PHP-FPM
    location ^~ /api {
        try_files $uri /index.php$is_args$args;
    }

    location ^~ /admin {
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass php:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/backend/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/backend/public;
        fastcgi_param HTTPS on;
        fastcgi_param SERVER_PORT 443;
        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        fastcgi_param HTTP_X_FORWARDED_HOST $http_x_forwarded_host;
        fastcgi_param HTTP_X_FORWARDED_FOR $http_x_forwarded_for;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
        internal;
    }

    location ~ \.php$ {
        return 404;
    }

    # Everything else → Next.js
    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
}
