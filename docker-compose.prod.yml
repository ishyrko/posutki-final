services:
  reverse-proxy:
    image: nginx:alpine
    container_name: rnb_reverse_proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/reverse-proxy.conf:/etc/nginx/conf.d/default.conf:ro
      - ${SSL_CERT_FULLCHAIN_PATH}:/etc/nginx/certs/fullchain.pem:ro
      - ${SSL_CERT_PRIVKEY_PATH}:/etc/nginx/certs/privkey.pem:ro
      - ${BASIC_AUTH_HTPASSWD_PATH}:/etc/nginx/auth/.htpasswd:ro
      - ./docker/nginx/acme:/var/www/certbot
    depends_on:
      - nginx
    networks:
      - posutki_network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: posutki_nginx
    volumes:
      - ./docker/nginx/prod.conf:/etc/nginx/conf.d/default.conf
      - ./backend/public:/var/www/backend/public
    depends_on:
      - php
      - frontend
    networks:
      - posutki_network
    restart: unless-stopped

  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: rnb_php
    volumes:
      - ./backend:/var/www/backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - APP_ENV=prod
      - APP_SECRET=${APP_SECRET}
      - DATABASE_URL=${DATABASE_URL}
      - TRUSTED_PROXIES=${TRUSTED_PROXIES:-127.0.0.1,REMOTE_ADDR}
      - CORS_ALLOW_ORIGIN=${CORS_ALLOW_ORIGIN}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - FRONTEND_URL=${FRONTEND_URL}
      - MAILER_DSN=${MAILER_DSN}
      - MAILER_FROM=${MAILER_FROM}
      - ADMIN_EMAILS=${ADMIN_EMAILS}
      # Async notification queue (doctrine transport; symfony/doctrine-messenger). Not the same as MAILER_DSN.
      - MESSENGER_TRANSPORT_DSN=${MESSENGER_TRANSPORT_DSN:-doctrine://default?auto_setup=0}
      - NEXTJS_REVALIDATE_URL=${NEXTJS_REVALIDATE_URL:-http://frontend:3000/revalidate}
      - NEXTJS_REVALIDATION_SECRET=${NEXTJS_REVALIDATION_SECRET}
    networks:
      - posutki_network
    restart: unless-stopped

  worker:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: rnb_worker
    command: sh -c "php bin/console messenger:consume async_notifications --time-limit=3600 --memory-limit=256M --no-interaction"
    volumes:
      - ./backend:/var/www/backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - APP_ENV=prod
      - APP_SECRET=${APP_SECRET}
      - DATABASE_URL=${DATABASE_URL}
      - TRUSTED_PROXIES=${TRUSTED_PROXIES:-127.0.0.1,REMOTE_ADDR}
      - CORS_ALLOW_ORIGIN=${CORS_ALLOW_ORIGIN}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - FRONTEND_URL=${FRONTEND_URL}
      - MAILER_DSN=${MAILER_DSN}
      - MAILER_FROM=${MAILER_FROM}
      - ADMIN_EMAILS=${ADMIN_EMAILS}
      - MESSENGER_TRANSPORT_DSN=${MESSENGER_TRANSPORT_DSN:-doctrine://default?auto_setup=0}
    depends_on:
      - php
    networks:
      - posutki_network
    restart: unless-stopped

  cron:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: rnb_cron
    command: >
      sh -c "echo '0 2 * * * cd /var/www/backend && php bin/console app:deactivate-expired-properties --no-interaction' | crontab - && crond -f -l 8"
    volumes:
      - ./backend:/var/www/backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - APP_ENV=prod
      - APP_SECRET=${APP_SECRET}
      - DATABASE_URL=${DATABASE_URL}
      - TRUSTED_PROXIES=${TRUSTED_PROXIES:-127.0.0.1,REMOTE_ADDR}
      - CORS_ALLOW_ORIGIN=${CORS_ALLOW_ORIGIN}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - FRONTEND_URL=${FRONTEND_URL}
      - MAILER_DSN=${MAILER_DSN}
      - MAILER_FROM=${MAILER_FROM}
      - ADMIN_EMAILS=${ADMIN_EMAILS}
      - MESSENGER_TRANSPORT_DSN=${MESSENGER_TRANSPORT_DSN:-doctrine://default?auto_setup=0}
    depends_on:
      - php
    networks:
      - posutki_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
        - NEXT_PUBLIC_YANDEX_MAPS_API_KEY=${NEXT_PUBLIC_YANDEX_MAPS_API_KEY}
    container_name: rnb_frontend
    environment:
      - BACKEND_INTERNAL_URL=http://nginx
      - REVALIDATION_SECRET=${NEXTJS_REVALIDATION_SECRET}
    depends_on:
      - php
    networks:
      - posutki_network
    restart: unless-stopped

networks:
  posutki_network:
    driver: bridge
