# Prod-сборка для cPanel: .next → ./frontend/.next, лимит 3 GB (как на shared hosting).
# make frontend-build-cpanel-prod
# make frontend-build-cpanel-verify-3g  — smoke-тест лимита
services:
  frontend:
    mem_limit: 3g
    memswap_limit: 3g
    oom_kill_disable: false
    volumes:
      - ./frontend:/app
      # Перекрывает frontend_next_cache из docker-compose.yml — .next должен быть на хосте для заливки.
      - ./frontend/.next:/app/.next
      - frontend_node_modules:/app/node_modules
