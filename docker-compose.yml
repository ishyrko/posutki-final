services:
  nginx:
    image: nginx:alpine
    container_name: posutki_nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./backend/public:/var/www/backend/public
    depends_on:
      - php
    networks:
      - posutki_network

  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: posutki_php
    volumes:
      - ./backend:/var/www/backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DATABASE_URL=mysql://root:12345@host.docker.internal:3306/posutki_db?serverVersion=8.0&charset=utf8mb4
      - APP_ENV=dev
      - APP_SECRET=change_this_secret_in_production
      - CORS_ALLOW_ORIGIN=^https?://[^/]+(:[0-9]+)?$$
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-986114625381-ng3peent2ffo7ci9hmltjvcqu1sqngkb.apps.googleusercontent.com}
      - FRONTEND_URL=http://localhost:3000
      - MAILER_DSN=smtp://mailpit:1025
      - MAILER_FROM=noreply@rnb.by
      - ADMIN_EMAILS=["admin@rnb.by"]
      - NEXTJS_REVALIDATE_URL=http://frontend:3000/revalidate
      - NEXTJS_REVALIDATION_SECRET=${NEXTJS_REVALIDATION_SECRET:-dev-revalidate-secret}
    networks:
      - posutki_network

  worker:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: posutki_worker
    command: sh -c "php bin/console messenger:consume async_notifications --time-limit=3600 --memory-limit=256M -vv"
    volumes:
      - ./backend:/var/www/backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DATABASE_URL=mysql://root:12345@host.docker.internal:3306/posutki_db?serverVersion=8.0&charset=utf8mb4
      - APP_ENV=dev
      - APP_SECRET=change_this_secret_in_production
      - CORS_ALLOW_ORIGIN=^https?://[^/]+(:[0-9]+)?$$
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-986114625381-ng3peent2ffo7ci9hmltjvcqu1sqngkb.apps.googleusercontent.com}
      - FRONTEND_URL=http://localhost:3000
      - MAILER_DSN=smtp://mailpit:1025
      - MAILER_FROM=noreply@rnb.by
      - ADMIN_EMAILS=["admin@rnb.by"]
    depends_on:
      - php
    restart: unless-stopped
    networks:
      - posutki_network

  cron:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: posutki_cron
    command: >
      sh -c "echo '0 2 * * * cd /var/www/backend && php bin/console app:deactivate-expired-properties --no-interaction' | crontab - && crond -f -l 8"
    volumes:
      - ./backend:/var/www/backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DATABASE_URL=mysql://root:12345@host.docker.internal:3306/posutki_db?serverVersion=8.0&charset=utf8mb4
      - APP_ENV=dev
      - APP_SECRET=change_this_secret_in_production
      - CORS_ALLOW_ORIGIN=^https?://[^/]+(:[0-9]+)?$$
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-986114625381-ng3peent2ffo7ci9hmltjvcqu1sqngkb.apps.googleusercontent.com}
      - FRONTEND_URL=http://localhost:3000
      - MAILER_DSN=smtp://mailpit:1025
      - MAILER_FROM=noreply@rnb.by
      - ADMIN_EMAILS=["admin@rnb.by"]
    depends_on:
      - php
    restart: unless-stopped
    networks:
      - posutki_network

  mysql:
    image: mysql:8.0
    container_name: posutki_mysql
    ports:
      - "3307:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root_password
      - MYSQL_DATABASE=rnb_db
      - MYSQL_USER=rnb_user
      - MYSQL_PASSWORD=rnb_password
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - posutki_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: posutki_frontend
    # node_modules в отдельном volume — иначе npm install на bind-mount (macOS) часто падает с ENOTEMPTY.
    # После смены package.json: docker compose run --rm frontend npm install  или  make frontend-install
    command: sh -c "npm install --no-audit --no-fund && exec npm run dev -- --hostname 0.0.0.0 --port 3000"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next_cache:/app/.next
    environment:
      # Иначе npm install не ставит devDependencies (typescript нужен для next.config.ts).
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost/api
      - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-986114625381-ng3peent2ffo7ci9hmltjvcqu1sqngkb.apps.googleusercontent.com}
      - BACKEND_INTERNAL_URL=http://nginx
      - REVALIDATION_SECRET=${NEXTJS_REVALIDATION_SECRET:-dev-revalidate-secret}
    depends_on:
      - php
    networks:
      - posutki_network

  mailpit:
    image: axllent/mailpit
    container_name: posutki_mailpit
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - posutki_network

volumes:
  mysql_data:
  frontend_node_modules:
  frontend_next_cache:


networks:
  posutki_network:
    driver: bridge
