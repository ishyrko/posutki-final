# cPanel + nginx: paste into the domain's custom Nginx directives
# (or ask the host to include this before the Passenger/try_files location).
# Goal: stop nginx from serving Application root files as static assets.
#
# After applying: restart Nginx / Node app, then check:
#   curl -sI https://posutki.by/package.json
#   → expect 404 (not 200)

location ~* ^/(package(-lock)?\.json|npm-shrinkwrap\.json|yarn\.lock|pnpm-lock\.yaml)$ {
    return 404;
}

location ~* ^/(server\.js|Dockerfile|README\.md|components\.json|tsconfig\.json|jsconfig\.json|next-env\.d\.ts)$ {
    return 404;
}

location ~* ^/(next|postcss|tailwind|eslint)\.config\..+$ {
    return 404;
}

location ~* ^/(node_modules|src|scripts|public)(/|$) {
    return 404;
}

# Do not block /_next/*.js — only source/tooling extensions
location ~* \.(tsx?|mts|cts|mjs|cjs|tsbuildinfo)$ {
    return 404;
}
